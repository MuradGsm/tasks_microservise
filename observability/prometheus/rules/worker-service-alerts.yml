groups:
  - name: worker-service-alerts
    rules:
      - alert: WorkerServiceDown
        expr: up{job="worker-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: worker-service
        annotations:
          summary: "worker-service is down"
          description: "Prometheus cannot scrape worker-service for more than 1 minute."

      - alert: WorkerHighFailedEventsRate
        expr: rate(sjira_worker_events_failed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: worker-service
        annotations:
          summary: "High failed event rate in worker-service"
          description: "worker-service is failing more than 0.1 events/sec for 5 minutes."

      - alert: WorkerEventProcessingLatencyHigh
        expr: histogram_quantile(
                0.95,
                sum by (le) (
                  rate(sjira_worker_event_processing_duration_seconds_bucket[5m])
                )
              ) > 1
        for: 5m
        labels:
          severity: warning
          service: worker-service
        annotations:
          summary: "worker-service p95 event processing latency is high"
          description: "p95 event processing latency is above 1 second for 5 minutes."

      - alert: WorkerNoNotificationsSentDespiteEvents
        expr: |
          sum(rate(sjira_worker_events_consumed_total[10m])) > 0
          and
          sum(rate(sjira_worker_notifications_sent_total[10m])) == 0
        for: 10m
        labels:
          severity: warning
          service: worker-service
        annotations:
          summary: "worker-service consumes events but sends no notifications"
          description: "Events are being consumed, but no notifications were sent for 10 minutes."

      - alert: WorkerNoEventsConsumed
        expr: sum(rate(sjira_worker_events_consumed_total[15m])) == 0
        for: 15m
        labels:
          severity: info
          service: worker-service
        annotations:
          summary: "worker-service has not consumed events recently"
          description: "No events were consumed during the last 15 minutes."
      
      - alert: WorkerValidationFailuresDetected
        expr: rate(sjira_worker_events_validation_failed_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: worker-service
        annotations:
          summary: "worker-service validation failures detected"
          description: "worker-service is receiving invalid event payloads."

      - alert: WorkerUnknownEventsDetected
        expr: rate(sjira_worker_events_unknown_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
          service: worker-service
        annotations:
          summary: "Unknown events detected in worker-service"
          description: "worker-service received unknown event types."

      - alert: WorkerNotificationDeliveryFailuresHigh
        expr: rate(sjira_worker_notification_delivery_failures_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: worker-service
        annotations:
          summary: "High notification delivery failure rate"
          description: "Notification delivery retries/failures are elevated."

      - alert: WorkerIssueServiceErrorsHigh
        expr: |
          sum(rate(sjira_worker_downstream_http_requests_total{target_service="issue-service",status=~"5..|error"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          service: worker-service
        annotations:
          summary: "worker-service has issue-service downstream errors"
          description: "Requests from worker-service to issue-service are failing."

      - alert: WorkerNotificationsServiceErrorsHigh
        expr: |
          sum(rate(sjira_worker_downstream_http_requests_total{target_service="notifications-service",status=~"5..|error"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          service: worker-service
        annotations:
          summary: "worker-service has notifications-service downstream errors"
          description: "Requests from worker-service to notifications-service are failing."