groups:
  - name: issue-service-alerts
    rules:

      - alert: IssueServiceDown
        expr: up{job="issue-service"} == 0
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Issue service is down"

      - alert: IssueServiceHighErrors
        expr: rate(http_server_requests_seconds_count{job="issue-service",status=~"5.."}[1m]) > 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High error rate in issue-service"

      - alert: ProjectServiceFailures
        expr: increase(sjira_issue_project_service_request_failures_total[1m]) > 3
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Project service failures from issue-service"