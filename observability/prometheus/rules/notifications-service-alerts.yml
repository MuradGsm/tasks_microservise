groups:
  - name: notifications-service-alerts
    rules:
      - alert: NotificationsServiceDown
        expr: up{job="notifications-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: notifications-service
        annotations:
          summary: "notifications-service is down"
          description: "Prometheus cannot scrape notifications-service for more than 1 minute."

      - alert: NotificationsPushFailureRateHigh
        expr: |
          (
            sum(rate(sjira_notifications_push_failed_total[5m]))
            /
            clamp_min(sum(rate(sjira_notifications_push_total[5m])), 0.001)
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          service: notifications-service
        annotations:
          summary: "High notification push failure rate"
          description: "More than 10% of internal notification push requests are failing during the last 5 minutes."

      - alert: NotificationsPushFailuresBurst
        expr: increase(sjira_notifications_push_failed_total[10m]) >= 5
        for: 2m
        labels:
          severity: warning
          service: notifications-service
        annotations:
          summary: "Notification push failures burst detected"
          description: "5 or more notification push failures happened during the last 10 minutes."

      - alert: NotificationsDeliveryLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(sjira_notifications_delivery_duration_seconds_bucket[5m])
            )
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: notifications-service
        annotations:
          summary: "notifications-service p95 latency is high"
          description: "95th percentile of notification processing time is above 1 second for 10 minutes."

      - alert: NotificationsNoWebSocketConnections
        expr: sjira_notifications_websocket_active_connections == 0
        for: 30m
        labels:
          severity: info
          service: notifications-service
        annotations:
          summary: "No active WebSocket connections"
          description: "There have been no active WebSocket connections for 30 minutes."