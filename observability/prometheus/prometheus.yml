global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/rules/api-getway-alerts.yml

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: "worker-service"
    static_configs:
      - targets: ["worker-service:8000"]

  - job_name: "notifications-service"
    static_configs:
      - targets: ["notifications-service:8000"]

  - job_name: "issue-service"
    static_configs:
      - targets: ["issue-service:8000"]