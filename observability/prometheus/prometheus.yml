global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/rules/api-gateway-alerts.yml
  - /etc/prometheus/rules/issue-service-alerts.yml
  - /etc/prometheus/rules/project-service-alerts.yml
  - /etc/prometheus/rules/worker-service-alerts.yml
  - /etc/prometheus/rules/notifications-service-alerts.yml
  - /etc/prometheus/rules/identity-service-alerts.yml
  
scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: "worker-service"
    static_configs:
      - targets: ["worker-service:8000"]

  - job_name: "notifications-service"
    static_configs:
      - targets: ["notifications-service:8000"]

  - job_name: "issue-service"
    static_configs:
      - targets: ["issue-service:8000"]

  - job_name: "project-service"
    static_configs:
      - targets: ["project-service:8000"]

  - job_name: "identity-service"
    static_configs:
      - targets: ["identity-service:8000"]