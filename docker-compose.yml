services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sjira
      POSTGRES_PASSWORD: sjira
      POSTGRES_DB: sjira
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sjira -d sjira"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  loki:
    image: grafana/loki:3.6.0
    user: "0:0"
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/tmp/loki

  grafana:
    image: grafana/grafana:12.1.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki

  identity-service:
    build: ./services/identity-service
    ports:
      - "8003:8000"
    environment:
      POSTGRES_DB: sjira
      POSTGRES_USER: sjira
      POSTGRES_PASSWORD: sjira
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PROJECT_SERVICE_URL: http://project-service:8000
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "service=identity-service,project=sjira"
        loki-retries: "5"
        loki-batch-size: "400"

  project-service:
    build: ./services/project-service
    ports:
      - "8004:8000"
    environment:
      POSTGRES_USER: sjira
      POSTGRES_PASSWORD: sjira
      POSTGRES_DB: sjira_project
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./services/project-service:/app
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "service=project-service,project=sjira"
        loki-retries: "5"
        loki-batch-size: "400"

  issue-service:
    build: ./services/issue-service
    ports:
      - "8005:8000"
    environment:
      POSTGRES_USER: sjira
      POSTGRES_PASSWORD: sjira
      POSTGRES_DB: sjira_issue
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PROJECT_SERVICE_URL: http://project-service:8000
      REDIS_URL: redis://redis:6379/0
      EVENTS_QUEUE_NAME: sjira:events
    volumes:
      - ./services/issue-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "service=issue-service,project=sjira"
        loki-retries: "5"
        loki-batch-size: "400"

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      IDENTITY_URL: http://identity-service:8000
      PROJECT_URL: http://project-service:8000
      ISSUE_URL: http://issue-service:8000
      NOTIFICATIONS_URL: http://notifications-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity-service:
        condition: service_started
      project-service:
        condition: service_started
      issue-service:
        condition: service_started
      notifications-service:
        condition: service_started
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "service=api-gateway,project=sjira"
        loki-retries: "5"
        loki-batch-size: "400"

  worker-service:
    build: ./services/worker-service
    ports:
      - "8006:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      EVENTS_QUEUE_NAME: sjira:events
      NOTIFICATIONS_URL: http://notifications-service:8000
      ISSUE_URL: http://issue-service:8000
    volumes:
      - ./services/worker-service:/app
    depends_on:
      redis:
        condition: service_healthy
      notifications-service:
        condition: service_started
      issue-service:
        condition: service_started
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "service=worker-service,project=sjira"
        loki-retries: "5"
        loki-batch-size: "400"

  notifications-service:
    build: ./services/notifications-service
    ports:
      - "8007:8000"
    environment:
      POSTGRES_USER: sjira
      POSTGRES_PASSWORD: sjira
      POSTGRES_DB: sjira_notifications
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql+asyncpg://sjira:sjira@postgres:5432/sjira_notifications
    volumes:
      - ./services/notifications-service:/app
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: "service=notifications-service,project=sjira"
        loki-retries: "5"
        loki-batch-size: "400"
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      

volumes:
  postgres_data:
  grafana_data:
  loki_data: